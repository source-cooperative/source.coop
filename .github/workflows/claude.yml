name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash(git checkout:*),Bash(git switch:*),Bash(git branch:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh issue view:*)"
          prompt: |
            When the user asks you to implement a change, fix a bug, or address an issue that requires code modifications:
            1. Create a new branch off the default branch (name it descriptively, e.g. `claude/fix-<short-description>` or `claude/issue-<number>`).
            2. Make the changes, commit them with a clear message, and push the branch.
            3. Read `.github/pull_request_template.md` and fill in each section (removing the HTML comment instructions). If the change resolves an issue, add "Closes #<n>" to the "What I'm changing" section. Write the filled template to a temp file and pass it to `gh pr create --body-file <path>`.
            4. Reply in the original thread with the PR link.

            For read-only questions or discussions, skip the PR workflow and just respond.
