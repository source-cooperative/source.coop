name: Claude Auto Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No track_progress / use_sticky_comment: we deliver a single FORMAL PR
          # review and supersede the prior one, so there are no accumulating
          # progress/summary comments across pushes.
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}

            You are reviewing this pull request. Deliver exactly ONE formal GitHub
            pull request review per run, replacing any prior review from earlier runs.

            STEP 1 — Supersede prior rounds.
            List existing reviews:
              `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --paginate`
            For each review authored by the Claude app user whose state is APPROVED or
            CHANGES_REQUESTED (i.e. still active), dismiss it so only this run's review
            is in effect:
              `gh api -X PUT repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/<id>/dismissals \
                 -f message="Superseded by a newer Claude review." -f event=DISMISS`

            STEP 2 — Review the diff (`gh pr diff`) for correctness bugs, security
            issues, and clear best-practice problems. Skip nits and anything the
            linter/formatter already enforces. If nothing is blocking, say so briefly —
            do not pad the review.

            STEP 3 — Submit ONE formal review in a single API call, bundling every
            inline note in the `comments` array:
              `gh api -X POST repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --input payload.json`

            Requirements for that JSON:
            - "event": "REQUEST_CHANGES" if there are blocking issues, otherwise "COMMENT".
              Never use "APPROVE" (bot approvals are restricted and not meaningful here).
            - "body": a short verdict followed by a brief bullet list. No checklists,
              no progress logs.
            - "comments": one entry per finding, each { "path", "line" (and "start_line"
              for multi-line), "body" }. Anchor each to the exact changed line(s).

            MAKE FINDINGS ONE-CLICK APPLYABLE. Whenever a finding has a concrete code
            fix, end that inline comment's body with a GitHub suggestion block so the
            author can apply it with the "Commit suggestion" button:

                ```suggestion
                <the exact replacement text for the commented line(s)>
                ```

            Rules for suggestions:
            - The block must replace the FULL line range the comment is anchored to
              (use start_line..line for multi-line replacements), and contain the
              COMPLETE, valid, ready-to-commit code for those lines — not a fragment.
              Re-read each suggestion and confirm it parses and balances brackets/quotes
              before including it; if you are not certain it compiles, use a prose
              comment instead of a suggestion.
            - Prefer several small, single-line suggestions over one large one — they
              are easier to apply and less error-prone.
            - Reserve plain prose comments for issues with no mechanical fix.

            BUILD THE PAYLOAD SAFELY — do not hand-write JSON escapes. Embedded literal
            "\n" sequences break the suggestion fences and the apply button. Instead:
            - Write each comment body (including its ```suggestion block, with real
              newlines) to its own file, e.g. c1.body, and the review summary to
              body.md.
            - Assemble with jq so newlines and quotes are encoded correctly, e.g.:
                jq -n --arg path "src/foo.ts" --argjson line 164 --rawfile body c1.body \
                  '{path:$path, line:$line, body:$body}' > c1.json
              (add `--argjson start_line N` and include it in the object for multi-line)
              then combine:
                jq -s '.' c1.json c2.json > comments.json
                jq -n --arg event "COMMENT" --rawfile body body.md \
                  --slurpfile comments comments.json \
                  '{event:$event, body:$body, comments:$comments[0]}' > payload.json
            - Validate before posting: `jq empty payload.json` must succeed. Confirm no
              comment body contains a literal backslash-n where a newline belongs.
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(jq:*),Write"
